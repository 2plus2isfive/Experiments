<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #000;
        color: #fff;
      }
      .page {
        width: 100%;
        height: 100vh;
        position: relative;
      }
      .parent {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .main {
        background-position: center;
        background-size: cover;
        background-color: #0000ff20;
        border: solid 2px #f00;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      @media screen and (orientation: portrait) {
        .main {
          width: 100vw;
          height: 100vw;
          max-height: 100vw;
          max-width: 100vh;
          aspect-ratio: 1/1;
        }
      }
      @media screen and (orientation: landscape) {
        .main {
          width: 100vh;
          height: 100vh;
          max-height: 100%;
          max-width: 100vh;
          aspect-ratio: 1/1;
        }
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="page">
      <div class="parent">
        <div class="main">
          <p>
            this square will stay a square<br />
            no matter how you resize the window<br />
            if you use <code>position: relative;</code>, on<br />
            the <code>.main</code> div, you can essentially<br />
            have a website locked in 1:1<br />
            <br />
            <a href="">code</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
