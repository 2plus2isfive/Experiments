    <style>

        color: #fff;
        font-family: sans-serif;
      }
      .profile {
        display: flex;
        align-items: center;
        background: linear-gradient(to right, #00000050, #00000000);
        font-size: 32px;
        width: 512px;
        pointer-events: none;
      }
      .pfp {
        width: 72px;
        border-radius: 10px;
        padding: 5px;
      }
      .name {
        transform: translate(-35px, 10px);
        text-shadow: 0 0 5px #000;
      }
      a {
        font-size:32px;
        text-decoration: none;
        font-family: monospace;
        font-weight: 800;
        padding-left:5px;
      }
      a:hover {
        padding-left:10px;
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="profile">
      <img
        class="pfp"
        src="https://avatars.githubusercontent.com/u/110780176?v=4"
        alt=""
      />
      <p class="name">2plus2isfive</p>
    </div>
    <div class="links">
      <p><a href="buttons.html">Buttons</a></p>
      <p><a href="colors.html">Color Pallete</a></p>
